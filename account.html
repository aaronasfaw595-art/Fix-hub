<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>FixHub - Account</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">FixHub</a>

        <div>
          <a class="nav-link text-white d-inline" href="index.html">Home</a>
          <a class="nav-link text-white d-inline" href="catalog.html"
            >Catalog</a
          >
          <a class="nav-link text-white d-inline" href="account.html"
            >Account</a
          >
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <h2>👤 My Account</h2>

      <div class="row align-items-center">
        <div class="col-md-3 text-center mb-3">
          <img
            id="account-photo"
            src="https://via.placeholder.com/120?text=Profile"
            alt="Profile photo"
            class="rounded-circle border"
            style="width: 120px; height: 120px; object-fit: cover"
          />
        </div>
        <div class="col-md-9">
          <p><b>Name:</b> <span id="account-name"></span></p>
          <p><b>Email:</b> <span id="account-email"></span></p>
          <p><b>Role:</b> <span id="account-role"></span></p>
          <p><b>Phone:</b> <span id="account-phone"></span></p>
          <p><b>Birth Date:</b> <span id="account-birth"></span></p>
          <p><b>About:</b> <span id="account-bio"></span></p>
        </div>
      </div>
    </div>

    <script src="script.js?v=fixhub-20260620c"></script>
  </body>
</html>
