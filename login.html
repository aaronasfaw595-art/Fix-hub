<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>FixHub Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body style="background: #f5f5f5">
    <div class="container">
      <div
        class="row justify-content-center align-items-center"
        style="min-height: 100vh; padding: 20px"
      >
        <div class="col-12 col-sm-10 col-md-5">
          <div class="card shadow-lg border-0 p-4 p-sm-5 rounded-4">
            <h2 class="text-center mb-4" style="font-size: 1.8rem">Login</h2>

            <label for="login-email" class="form-label">Email</label>
            <input
              type="email"
              id="login-email"
              class="form-control mb-3"
              placeholder="Email"
              autocomplete="email"
              style="min-height: 44px; padding: 12px 14px; font-size: 1rem"
              required
            />

            <label for="login-password" class="form-label">Password</label>
            <input
              type="password"
              id="login-password"
              class="form-control mb-4"
              placeholder="Password"
              autocomplete="current-password"
              style="min-height: 44px; padding: 12px 14px; font-size: 1rem"
              required
            />

            <button
              class="btn btn-dark w-100"
              style="
                min-height: 48px;
                padding: 14px 16px;
                font-size: 1rem;
                font-weight: 600;
              "
              onclick="loginUser()"
            >
              Login
            </button>

            <p class="text-center mt-4">
              Don't have an account?
              <a href="register.html" style="font-weight: 600; color: #38bdf8">
                Register
              </a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script>
      function fetchWithTimeout(url, options = {}, timeoutMs = 5000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

        return fetch(url, {
          ...options,
          signal: controller.signal,
        }).finally(() => clearTimeout(timeoutId));
      }

      async function loginUser() {
        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;

        if (!email || !password) {
          alert("Please fill all fields");
          return;
        }

      const apiBaseCandidates = (() => {
  return [
    "https://fix-hub-backend.onrender.com"
  ];
})();

        const returnTo = new URLSearchParams(window.location.search).get(
          "redirect",
        );

        let response;
        let lastError;

        for (const base of apiBaseCandidates) {
          try {
            response = await fetchWithTimeout(
              `${base}/api/auth/login`,
              {
                method: "POST",
                mode: "cors",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({ email, password }),
              },
              6000,
            );

            if (response.ok) {
              break;
            }
          } catch (err) {
            lastError = err;
          }
        }

        if (!response) {
          const message =
            lastError?.message ||
            "Failed to connect to the server. Make sure the backend is running and your phone is on the same Wi‑Fi.";
          alert(message);
          return;
        }

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          alert(data.message || "Login failed");
          return;
        }

        if (!data.success) {
          alert(data.message || "Login failed");
          return;
        }

        localStorage.setItem("currentUser", JSON.stringify(data.user));
        localStorage.setItem("token", data.token);
        alert("Login successful");

        const safeReturnTo =
          returnTo && returnTo.startsWith("/") ? returnTo : "index.html";

        window.location.href = safeReturnTo;
      }
    </script>
  </body>
</html>
